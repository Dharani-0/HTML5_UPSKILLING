<!DOCTYPE html>
<html>
<body>

Phone:
<input type="text" id="phone" onblur="validatePhone()">
<p id="p1"></p>

Select Event:
<select onchange="showFee()">
    <option value="100">Music - ₹100</option>
    <option value="200">Sports - ₹200</option>
</select>

<p id="fee"></p>

<button onclick="confirmMsg()">Submit</button>

<h3>Double Click Image</h3>
<img src="event.jpg" width="150"
ondblclick="this.style.width='300px'">

<br><br>

<textarea id="feedback" onkeyup="countChar()"></textarea>
<p id="count"></p>

<script>

function validatePhone(){
    let p=document.getElementById("phone").value;

    if(p.length!=10)
        document.getElementById("p1").innerHTML=
        "Invalid Phone Number";
    else
        document.getElementById("p1").innerHTML=
        "Valid";
}

function showFee(){
    let fee=document.querySelector("select").value;
    document.getElementById("fee").innerHTML=
    "Fee = ₹"+fee;
}

function confirmMsg(){
    alert("Feedback Submitted");
}

function countChar(){
    let len=document.getElementById("feedback").value.length;
    document.getElementById("count").innerHTML=
    "Characters: "+len;
}

</script>

</body>
</html>
